<!DOCTYPE html>
<html>
<head>
    <title>Order Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1 class="mb-3">Order Item List</h1>
    <a href="{% url 'add-new-orderitem' %}" class="btn btn-primary mb-3">+ Add New Order Item</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Item ID</th>
                <th>Order</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.order }}</td>
                <td>{{ item.product }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.price }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">No order items yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
