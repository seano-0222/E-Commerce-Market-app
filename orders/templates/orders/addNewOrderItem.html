<!DOCTYPE html>
<html>
<head>
    <title>Add New Order Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
        .nav-brand { font-size: 1.25rem; font-weight: 700; color: #a78bfa; text-decoration: none; }
        .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        .nav-links a:hover { color: #a78bfa; }
        .container { max-width: 600px; margin: 2.5rem auto; padding: 0 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .card { background: #1e293b; border-radius: 12px; padding: 1.75rem; border: 1px solid #334155; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: .85rem; color: #94a3b8; margin-bottom: .4rem; }
        input, select, textarea { width: 100%; padding: .6rem .9rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: .9rem; }
        input:focus, select:focus { outline: none; border-color: #a78bfa; }
        .error { color: #f87171; font-size: .8rem; margin-top: .25rem; }
        .btn-primary { background: #a78bfa; color: #0f172a; padding: .6rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: .9rem; }
        .btn-primary:hover { background: #c4b5fd; }
        .btn-back { color: #94a3b8; text-decoration: none; margin-left: 1rem; font-size: .9rem; }
        .btn-back:hover { color: #e2e8f0; }
    </style>
</head>
<body>
    <nav>
        <a href="/orders/" class="nav-brand">MarketPlace</a>
        <div class="nav-links">
            <a href="/orders/">Orders</a>
            <a href="{% url 'edit-profile' %}">Edit Profile</a>
            <a href="/logout/">Logout</a>
        </div>
    </nav>
    <div class="container">
        <h1>Add New Order Item</h1>
        <div class="card">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="error">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn-primary">Save</button>
                <a href="{% url 'order_list' %}" class="btn-back">Back</a>
            </form>
        </div>
    </div>
</body>
</html>
