<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Person</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px 20px;
        }
        .card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #1f2937;
        }
        p {
            color: #6b7280;
        }
        form p {
            margin-bottom: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-top: 6px;
        }
        button, a {
            display: inline-block;
            margin-top: 12px;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
        }
        button {
            background: #2563eb;
            color: white;
        }
        a {
            background: #e5e7eb;
            color: #111827;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Add New Person Record</h1>
        <p>Use this form to add a new record to the accounts app.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Record</button>
            <a href="{% url 'index' %}">Back to Home</a>
        </form>
    </div>
</body>
</html>
