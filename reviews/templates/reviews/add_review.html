<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Review — {{ product.name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
    nav {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .nav-brand { font-size: 1.25rem; font-weight: 700; color: #a78bfa; text-decoration: none; }
    .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
    .nav-links a:hover { color: #a78bfa; }
    .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; }
    .back { display: inline-block; margin-bottom: 1.25rem; color: #a78bfa; text-decoration: none; font-size: .9rem; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #f8fafc; margin-bottom: .25rem; }
    .product-name { color: #a78bfa; }
    .sub { color: #64748b; font-size: .875rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #94a3b8; margin-bottom: .4rem; }
    select, textarea {
      width: 100%; padding: .65rem .9rem; border-radius: 9px;
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      font-family: 'Inter', sans-serif; font-size: .9rem; margin-bottom: 1.1rem;
      transition: border-color .2s;
    }
    select:focus, textarea:focus { outline: none; border-color: #a78bfa; }
    textarea { resize: vertical; min-height: 110px; }
    .star-row { display: flex; gap: .4rem; margin-bottom: 1.1rem; }
    .star-btn {
      font-size: 1.5rem; cursor: pointer; color: #334155; transition: color .15s;
      background: none; border: none; padding: 0;
    }
    .star-btn:hover, .star-btn.active { color: #fbbf24; }
    .btn-submit {
      width: 100%; padding: .75rem; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff;
      font-family: 'Inter', sans-serif; font-size: .95rem; font-weight: 700;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .88; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">MarketPlace</a>
    <div class="nav-links">
      <a href="{% url 'products:product_list' %}">Products</a>
      <a href="/cart/">Cart</a>
      <a href="/logout/">Logout</a>
    </div>
  </nav>
  <div class="center">
    <div>
      <a href="{% url 'reviews:product_reviews' product.product_id %}" class="back">← Back to Reviews</a>
      <div class="card">
        <h1>Write a Review</h1>
        <p class="sub">for <span class="product-name">{{ product.name }}</span></p>
        <form method="post">
          {% csrf_token %}
          <label>Rating</label>
          <div class="star-row" id="stars">
            {% for i in "12345" %}
            <button type="button" class="star-btn" data-val="{{ forloop.counter }}">★</button>
            {% endfor %}
          </div>
          <input type="hidden" name="rating" id="rating-input" value="5">

          <label for="comment">Comment</label>
          <textarea id="comment" name="comment" placeholder="Share your thoughts about this product..." required></textarea>

          <button type="submit" class="btn-submit">Submit Review</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    const stars = document.querySelectorAll('.star-btn');
    const ratingInput = document.getElementById('rating-input');
    let selected = 5;

    function setStars(val) {
      stars.forEach((s, i) => s.classList.toggle('active', i < val));
    }
    setStars(selected);

    stars.forEach(btn => {
      btn.addEventListener('click', () => {
        selected = parseInt(btn.dataset.val);
        ratingInput.value = selected;
        setStars(selected);
      });
      btn.addEventListener('mouseover', () => setStars(parseInt(btn.dataset.val)));
      btn.addEventListener('mouseout', () => setStars(selected));
    });
  </script>
</body>
</html>
