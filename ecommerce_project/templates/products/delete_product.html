{% extends 'base.html' %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <h1>🗑️ Delete <span>{{ product.name }}</span></h1>
        <p>Are you sure you want to delete this product?</p>
    </div>
</section>

<div class="form-section">
    <div class="form-container">
        <div class="delete-warning">
            <span class="warning-icon">⚠️</span>
            <h3>Warning!</h3>
            <p>This action cannot be undone. The product "{{ product.name }}" will be permanently deleted.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn-delete-confirm">Yes, Delete Product</button>
                <a href="{% url 'products:product_list' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .delete-warning {
        text-align: center;
        padding: 40px;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 12px;
        margin-bottom: 24px;
    }
    
    .warning-icon {
        font-size: 3rem;
        display: block;
        margin-bottom: 16px;
    }
    
    .delete-warning h3 {
        color: #ef4444;
        margin-bottom: 12px;
    }
    
    .delete-warning p {
        color: #9ca3af;
    }
    
    .btn-delete-confirm {
        flex: 1;
        padding: 12px 24px;
        background: #ef4444;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .btn-delete-confirm:hover {
        background: #dc2626;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
