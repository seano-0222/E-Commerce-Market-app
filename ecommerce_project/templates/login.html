{% extends 'base.html' %}

{% block content %}
<!-- Hero Section for Login -->
<section class="hero">
    <div class="hero-content">
        <div class="login-icon-large">
            🔐
        </div>
        <h1>Welcome <span>Back</span></h1>
        <p>Login to access your account and continue shopping</p>
    </div>
</section>

<!-- Login Form Section -->
<div class="login-section">
    <div class="login-container">
        <div class="login-header">
            <h2>Sign In</h2>
            <p>Enter your credentials to access your account</p>
        </div>

        <form method="post" class="login-form">
            {% csrf_token %}

            <!-- Username Field -->
            <div class="form-group">
                <label for="username" class="form-label">
                    Username <span class="required-star">*</span>
                </label>
                <div class="form-field">
                    <input type="text" id="username" name="username" required
                           placeholder="Enter your username"
                           class="form-input">
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">
                    Password <span class="required-star">*</span>
                </label>
                <div class="form-field">
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password"
                           class="form-input">
                </div>
            </div>

            <!-- Form Actions -->
            <div class="form-actions">
                <button type="submit" class="btn-login-submit">
                    <span>🔑</span> Login
                </button>
            </div>
        </form>

        <!-- Register Link -->
        <div class="register-link">
            <p>Don't have an account? <a href="{% url 'accounts:register' %}" class="register-link-btn">Create Account →</a></p>
        </div>

        <!-- Help Links -->
        <div class="help-links">
            <a href="#" class="help-link">Forgot Password?</a>
            <span class="separator">•</span>
            <a href="/admin/" class="help-link">Admin Access</a>
        </div>
    </div>
</div>

<style>
    /* Force dark background on all elements */
    html, body {
        background: #0f0f1a !important;
        margin: 0;
        padding: 0;
    }

    /* Hero Section */
    .hero {
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 60%, #0f3460 100%);
        color: #fff;
        padding: 60px 40px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        position: relative;
        z-index: 1;
    }

    .hero-content {
        max-width: 800px;
        margin: 0 auto;
    }

    .login-icon-large {
        font-size: 4rem;
        margin-bottom: 20px;
        display: inline-block;
        animation: shake 3s infinite;
    }

    @keyframes shake {
        0%, 100% {
            transform: translateX(0);
        }
        10%, 30%, 50%, 70%, 90% {
            transform: translateX(-2px);
        }
        20%, 40%, 60%, 80% {
            transform: translateX(2px);
        }
    }

    .hero h1 {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 16px;
        line-height: 1.15;
        color: #fff;
    }

    .hero h1 span {
        color: #4f8ef7;
    }

    .hero p {
        font-size: 1rem;
        color: #9ca3af;
    }

    /* Login Section */
    .login-section {
        max-width: 500px;
        margin: 40px auto;
        padding: 0 20px;
        position: relative;
        z-index: 1;
    }

    .login-container {
        background: #1a1a2e;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .login-header {
        background: #0f0f1a;
        padding: 32px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .login-header h2 {
        color: #fff;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .login-header p {
        color: #9ca3af;
        font-size: 0.9rem;
    }

    /* Form Styles */
    .login-form {
        padding: 32px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        display: block;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .required-star {
        color: #ef4444;
        margin-left: 4px;
    }

    .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #0f0f1a;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
        outline: none;
        border-color: #4f8ef7;
        box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.1);
    }

    .form-input::placeholder {
        color: #6b7280;
    }

    /* Submit Button */
    .form-actions {
        margin-top: 32px;
    }

    .btn-login-submit {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 24px;
        background: linear-gradient(135deg, #4f8ef7, #8b5cf6);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
    }

    .btn-login-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3);
    }

    .btn-login-submit:active {
        transform: translateY(0);
    }

    /* Register Link */
    .register-link {
        padding: 0 32px 24px 32px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .register-link p {
        color: #9ca3af;
        font-size: 0.9rem;
    }

    .register-link-btn {
        color: #10b981;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }

    .register-link-btn:hover {
        color: #059669;
        text-decoration: underline;
    }

    /* Help Links */
    .help-links {
        padding: 24px 32px 32px;
        text-align: center;
        display: flex;
        justify-content: center;
        gap: 12px;
    }

    .help-link {
        color: #4f8ef7;
        text-decoration: none;
        font-size: 0.85rem;
        transition: color 0.2s;
    }

    .help-link:hover {
        color: #8b5cf6;
        text-decoration: underline;
    }

    .separator {
        color: #4b5563;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .hero {
            padding: 40px 20px;
        }

        .hero h1 {
            font-size: 2rem;
        }

        .login-header {
            padding: 24px;
        }

        .login-header h2 {
            font-size: 1.4rem;
        }

        .login-form {
            padding: 24px;
        }

        .register-link {
            padding: 0 24px 20px 24px;
        }

        .help-links {
            padding: 20px 24px 24px;
        }
    }

    @media (max-width: 480px) {
        .hero h1 {
            font-size: 1.5rem;
        }

        .login-icon-large {
            font-size: 3rem;
        }

        .form-label {
            font-size: 0.85rem;
        }

        .form-input {
            font-size: 0.85rem;
            padding: 10px 14px;
        }

        .help-links {
            flex-direction: column;
            gap: 8px;
        }

        .separator {
            display: none;
        }
    }
</style>
{% endblock %}
